name: tycoon_tap
description: TycoonTap - Idle Business Simulator
publish_to: 'none'
version: 1.0.4+4

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  audioplayers: ^5.2.1
  intl: ^0.19.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  http: ^1.2.0
  url_launcher: ^6.2.4
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
